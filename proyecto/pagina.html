</div>
<div>

<div id="display-ip" class="text-slate-500 font-mono text-[9px] mt-0.5">0.0.0.0</div>
</div>
</div>
<div class="flex items-center gap-1">
<span class="font-label text-[9px] text-slate-500 uppercase">SD:</span>
<span class="font-mono text-[10px] text-slate-300">84%</span>
</div>
</div>

<section class="px-4 space-y-3">
<div class="bg-slate-900 border border-slate-800 p-4 space-y-3">

<span class="absolute right-3 top-2.5 material-symbols-outlined text-slate-600 text-sm">edit</span>
</div>
</div>
<button id="btn-update" class="w-full bg-primary py-2.5 text-slate-950 font-bold font-label uppercase text-[10px] hover:bg-primary-fixed transition-colors active:scale-[0.98]">Update Endpoint</button>
</div>
<div class="flex gap-2">

<span class="material-symbols-outlined text-base">download</span>
        Fetch Data
      </button>

<span class="material-symbols-outlined text-base">delete_sweep</span>
        Clear View
      </button>
</div>
</section>
<section class="mx-4 flex flex-col bg-slate-900 border border-slate-800 overflow-hidden relative min-h-[400px]">

<div class="w-6 h-3.5 bg-slate-800 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-slate-400 after:border-slate-300 after:border after:rounded-full after:h-2.5 after:w-2.5 after:transition-all peer-checked:bg-cyan-900 peer-checked:after:bg-cyan-400"></div>
</label>
</div>
<span class="material-symbols-outlined text-slate-500 text-base">fullscreen</span>
</div>
</div>

<span class="material-symbols-outlined text-xl">folder_open</span>

</a>
<a class="flex flex-col items-center justify-center gap-1 text-slate-500 hover:text-slate-300 transition-colors" href="#">
<span class="material-symbols-outlined text-xl">settings_input_component</span>
<span class="font-mono text-[8px] uppercase tracking-tighter">Network</span>
</a>

<span class="material-symbols-outlined text-xl">terminal</span>
<span class="font-mono text-[8px] uppercase tracking-tighter">Logs</span>
</a>
<a class="flex flex-col items-center justify-center gap-1 text-slate-500 hover:text-slate-300 transition-colors" href="#">
<span class="material-symbols-outlined text-xl">menu</span>
<span class="font-mono text-[8px] uppercase tracking-tighter">More</span>
</a>
</nav>

<script>
    // ELEMENTOS DEL DOM
    const btnFetch = document.getElementById('btn-fetch');
    const btnClear = document.getElementById('btn-clear');
    const btnUpdate = document.getElementById('btn-update');
    const inputIp = document.getElementById('input-ip');
    const dataContainer = document.getElementById('data-container');
    const displayIp = document.getElementById('display-ip');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const syncTime = document.getElementById('sync-time');
    const byteSize = document.getElementById('byte-size');

    // FUNCIONALIDAD: FETCH DATA
    btnFetch.addEventListener('click', async () => {
        const ip = inputIp.value.trim();
        if (!ip) return alert("Ingresa una IP válida");

        dataContainer.innerHTML = '<div class="animate-pulse text-cyan-400">[SYSTEM] Iniciando petición a la Pico...</div>';
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000); // 5 seg timeout

            const response = await fetch(`http://${ip}/archivo`, { signal: controller.signal });
            clearTimeout(timeoutId);

            if (!response.ok) throw new Error('Servidor no responde');
            
            const data = await response.text();
            
            // Actualizar Interfaz
            statusDot.classList.replace('bg-slate-500', 'bg-cyan-400');
            statusDot.classList.add('animate-pulse');
            statusText.innerText = "Connected";
            statusText.classList.replace('text-slate-500', 'text-cyan-400');
            syncTime.innerText = new Date().toLocaleTimeString();
            byteSize.innerText = `${data.length} bytes`;
            
            // Renderizar lineas
            dataContainer.innerHTML = '';
            const lines = data.split('\n');
            lines.forEach((line, index) => {
                if(line.trim() === "") return;
                dataContainer.innerHTML += `
                    <div class="flex gap-3 group">
                        <span class="w-5 text-right text-slate-700 select-none text-[10px]">${(index + 1).toString().padStart(2, '0')}</span>
                        <span class="text-slate-300 whitespace-nowrap">${line}</span>
                    </div>`;
            });

        } catch (error) {
            dataContainer.innerHTML = `<div class="text-error">[ERROR] No se pudo conectar: ${error.message}</div>`;
            statusDot.classList.replace('bg-cyan-400', 'bg-slate-500');
            statusDot.classList.remove('animate-pulse');
            statusText.innerText = "Offline";
        }
    });

    // FUNCIONALIDAD: UPDATE IP DISPLAY
    btnUpdate.addEventListener('click', () => {
        displayIp.innerText = inputIp.value;
        const btn = btnUpdate;
        btn.innerText = "IP UPDATED";
        setTimeout(() => btn.innerText = "UPDATE ENDPOINT", 2000);
    });

    // FUNCIONALIDAD: CLEAR VIEW
    btnClear.addEventListener('click', () => {
        dataContainer.innerHTML = '<div class="text-slate-500 font-italic">View cleared. Ready for next sync.</div>';
        byteSize.innerText = "0B";
    });
</script>
